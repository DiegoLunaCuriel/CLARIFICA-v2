<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background: very dark warm-black rounded square -->
  <rect width="100" height="100" rx="20" fill="#0f0800"/>

  <!-- Subtle inner border for depth -->
  <rect x="1.5" y="1.5" width="97" height="97" rx="18.5" fill="none" stroke="#2a1800" stroke-width="3"/>

  <!-- Hard hat: top button/knob -->
  <rect x="44" y="17" width="12" height="9" rx="3" fill="#f5a400"/>

  <!-- Hard hat: dome -->
  <path d="M 20 63 L 20 58 C 20 35 33 27 50 25 C 67 27 80 35 80 58 L 80 63 Z" fill="#f5a400"/>

  <!-- Hard hat: wide brim -->
  <rect x="11" y="60" width="78" height="13" rx="6.5" fill="#f5a400"/>

  <!-- Interior strap detail (subtle shading) -->
  <line x1="35" y1="73" x2="35" y2="63" stroke="#c47800" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="65" y1="73" x2="65" y2="63" stroke="#c47800" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
</svg>
